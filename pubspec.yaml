name: smittenbrot_app
description: "Smittenbrot - Artisan Bakery Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Payments
  flutter_stripe: ^11.4.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # Utilities
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.2
  logger: ^2.5.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  mockito: ^5.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icons/
